<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nivos Pixel Wars - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0e0e0e; touch-action: none; overflow: hidden; margin: 0; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; position: relative; }
        #canvas-container:active { cursor: grabbing; }
        canvas { 
            image-rendering: pixelated; 
            background-color: white; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .ui-overlay { pointer-events: none; position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; justify-content:建设; }
        .interactive { pointer-events: auto; }
        .palette-item { width: 35px; height: 35px; border-radius: 4px; cursor: pointer; transition: transform 0.1s; border: 2px solid rgba(0,0,0,0.2); }
        .palette-item:hover { transform: scale(1.15); }
        .palette-item.active { border: 3px solid white; transform: scale(1.2); }
        #loader { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; color: white; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="loader">Veriler Yükleniyor... Sabret Kanka.</div>

<div class="ui-overlay">
    <div class="flex justify-between p-4 interactive">
        <div class="bg-black/80 text-white p-3 rounded-lg border border-white/10 backdrop-blur-md">
            <h1 class="text-orange-500 font-bold text-xl uppercase tracking-tighter">Nivos Pixel Wars</h1>
            <p class="text-xs opacity-70" id="status">Online: Bağlanıyor...</p>
        </div>
        <div class="bg-black/80 text-white p-3 rounded-lg border border-white/10 backdrop-blur-md h-fit">
            <span id="coords" class="font-mono text-sm text-green-400">X: 0, Y: 0</span>
        </div>
    </div>

    <div class="mt-auto pb-10 flex flex-col items-center gap-4">
        <div id="cooldown-timer" class="bg-orange-600 text-white px-6 py-2 rounded-full font-bold shadow-xl hidden">
            BEKLE: 1s
        </div>
        <div class="bg-black/90 p-4 rounded-2xl border border-white/20 flex gap-2 shadow-2xl interactive overflow-x-auto max-w-[95vw]" id="palette">
            </div>
    </div>
</div>

<div id="canvas-container">
    <canvas id="placeCanvas"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onChildAdded, onChildChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- SENİN FİREBASE BİLGİLERİN ---
    const firebaseConfig = {
        apiKey: "AIzaSyC1qKWgOcfueYOlqbcp_kmPg63lLuqfEjk",
        authDomain: "nivos-fe8ff.firebaseapp.com",
        databaseURL: "https://nivos-fe8ff-default-rtdb.firebaseio.com",
        projectId: "nivos-fe8ff",
        storageBucket: "nivos-fe8ff.firebasestorage.app",
        messagingSenderId: "736073357906",
        appId: "1:736073357906:web:4dc3aac147971309d59d8b",
        measurementId: "G-7GQGPHVRS9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pixelsRef = ref(db, 'pixels');

    // --- AYARLAR ---
    const CANVAS_SIZE = 500; // 500x500 idealdir, çok kasmaması için.
    const colors = [
        '#6D001A', '#BE0039', '#FF4500', '#FFA800', '#FFD635', '#FFF8B8', '#00A368', '#00CC78',
        '#7EED56', '#00756F', '#009EAA', '#00CCC0', '#2450A4', '#3690EA', '#51E9F4', '#493AC1',
        '#6A5CFF', '#94B3FF', '#811E9F', '#B44AC0', '#E4ABFF', '#DE107F', '#FF3881', '#FF99AA',
        '#6D482F', '#9C6926', '#FFB470', '#000000', '#515252', '#898D90', '#D4D7D9', '#FFFFFF'
    ];

    let selectedColor = '#000000';
    let scale = 2;
    let translateX = window.innerWidth / 2 - (CANVAS_SIZE * scale) / 2;
    let translateY = window.innerHeight / 2 - (CANVAS_SIZE * scale) / 2;
    let isDragging = false;
    let lastMousePos = { x: 0, y: 0 };
    let onCooldown = false;

    const canvas = document.getElementById('placeCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const container = document.getElementById('canvas-container');
    const coordsEl = document.getElementById('coords');

    function init() {
        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        
        createPalette();
        applyTransform();
        setupSync();
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('status').innerText = "Bağlantı Başarılı!";
    }

    // --- PALET OLUŞTURMA ---
    function createPalette() {
        const palette = document.getElementById('palette');
        colors.forEach(color => {
            const div = document.createElement('div');
            div.className = 'palette-item';
            div.style.backgroundColor = color;
            if(color === selectedColor) div.classList.add('active');
            div.onclick = () => {
                selectedColor = color;
                document.querySelectorAll('.palette-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
            };
            palette.appendChild(div);
        });
    }

    // --- EKRAN HAREKETLERİ (ZOOM/PAN) ---
    function applyTransform() {
        canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    container.onwheel = (e) => {
        e.preventDefault();
        const zoomSpeed = 0.15;
        const delta = e.deltaY > 0 ? 1 - zoomSpeed : 1 + zoomSpeed;
        
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        translateX = mouseX - (mouseX - translateX) * delta;
        translateY = mouseY - (mouseY - translateY) * delta;
        scale *= delta;
        
        // Sınırlandırma
        scale = Math.min(Math.max(0.5, scale), 40);
        applyTransform();
    };

    container.onmousedown = (e) => {
        if (e.button === 0 && !e.shiftKey) { // Sol tık boyama içindir, orta/sağ sürükleme
             // Boyama tetiklenecek
        } else {
            isDragging = true;
            lastMousePos = { x: e.clientX, y: e.clientY };
        }
    };

    window.onmousemove = (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (rect.width / CANVAS_SIZE));
        const y = Math.floor((e.clientY - rect.top) / (rect.height / CANVAS_SIZE));

        if (x >= 0 && x < CANVAS_SIZE && y >= 0 && y < CANVAS_SIZE) {
            coordsEl.innerText = `X: ${x}, Y: ${y}`;
        }

        if (isDragging) {
            translateX += e.clientX - lastMousePos.x;
            translateY += e.clientY - lastMousePos.y;
            lastMousePos = { x: e.clientX, y: e.clientY };
            applyTransform();
        }
    };

    window.onmouseup = () => isDragging = false;

    // --- PIXEL BOYAMA VE FIREBASE ---
    canvas.onclick = (e) => {
        if (onCooldown || isDragging) return;

        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (rect.width / CANVAS_SIZE));
        const y = Math.floor((e.clientY - rect.top) / (rect.height / CANVAS_SIZE));

        if (x >= 0 && x < CANVAS_SIZE && y >= 0 && y < CANVAS_SIZE) {
            sendPixel(x, y, selectedColor);
        }
    };

    function sendPixel(x, y, color) {
        const pixelId = `${x}_${y}`;
        set(ref(db, 'pixels/' + pixelId), {
            c: color,
            t: Date.now()
        }).then(() => {
            handleCooldown();
        });
    }

    function handleCooldown() {
        onCooldown = true;
        const timerEl = document.getElementById('cooldown-timer');
        timerEl.classList.remove('hidden');
        
        setTimeout(() => {
            onCooldown = false;
            timerEl.classList.add('hidden');
        }, 1000); // 1 Saniye Cooldown
    }

    // --- GERÇEK ZAMANLI SENKRONİZASYON ---
    function setupSync() {
        // Yeni bir piksel eklendiğinde veya değiştiğinde tuvale çiz
        onChildAdded(pixelsRef, (snapshot) => {
            const [x, y] = snapshot.key.split('_').map(Number);
            const data = snapshot.val();
            drawOnCanvas(x, y, data.c);
        });

        onChildChanged(pixelsRef, (snapshot) => {
            const [x, y] = snapshot.key.split('_').map(Number);
            const data = snapshot.val();
            drawOnCanvas(x, y, data.c);
        });
    }

    function drawOnCanvas(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 1, 1);
    }

    // Başlat
    init();

</script>

</body>
</html>
