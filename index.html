<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivos Watch Party - Pro</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Sol Oda Listesi */
        .sidebar { width: 250px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .sidebar h2 { font-size: 1.2em; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #room-list { list-style: none; padding: 0; overflow-y: auto; flex: 1; }
        .room-item { padding: 10px; background: #252525; margin-bottom: 8px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .room-item:hover { background: #ff0000; }

        /* Ana İçerik */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; text-align: center; }
        #player { width: 100%; aspect-ratio: 16/9; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000; }
        
        .controls { margin-top: 20px; display: flex; gap: 10px; width: 100%; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; flex: 1; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: #ff0000; color: white; font-weight: bold; cursor: pointer; }
        
        #room-info { margin-bottom: 10px; color: #aaa; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Aktif Odalar</h2>
    <div id="room-list">Yükleniyor...</div>
    <button onclick="createNewRoom()" style="width: 100%; margin-top: 10px;">Yeni Oda Aç</button>
</div>

<div class="main-content">
    <div class="container">
        <div id="room-info">Şu anki Oda: <strong id="room-display-name">Genel</strong></div>
        <div id="player"></div>
        
        <div class="controls">
            <input type="text" id="videoUrl" placeholder="YouTube Video ID">
            <button onclick="changeVideo()">Video Yükle</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC1qKWgOcfueYOlqbcp_kmPg63lLuqfEjk",
        authDomain: "nivos-fe8ff.firebaseapp.com",
        databaseURL: "https://nivos-fe8ff-default-rtdb.firebaseio.com",
        projectId: "nivos-fe8ff",
        storageBucket: "nivos-fe8ff.firebasestorage.app",
        messagingSenderId: "736073357906",
        appId: "1:736073357906:web:4dc3aac147971309d59d8b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentRoomId = window.location.hash.substring(1) || "genel-oda";
    document.getElementById('room-display-name').innerText = currentRoomId;

    // --- ODA LİSTESİ ÇEKME ---
    const allRoomsRef = ref(db, 'rooms');
    onValue(allRoomsRef, (snapshot) => {
        const rooms = snapshot.val();
        const listDiv = document.getElementById('room-list');
        listDiv.innerHTML = "";
        for (let id in rooms) {
            const item = document.createElement('div');
            item.className = 'room-item';
            item.innerText = id + (rooms[id].isPrivate ? " 🔒" : "");
            item.onclick = () => joinRoom(id, rooms[id].password);
            listDiv.appendChild(item);
        }
    });

    // --- ODA DEĞİŞTİRME ---
    window.joinRoom = function(id, pass) {
        if(pass) {
            const inputPass = prompt("Oda şifresini girin:");
            if(inputPass !== pass) { alert("Hatalı şifre!"); return; }
        }
        window.location.hash = id;
        location.reload();
    };

    window.createNewRoom = function() {
        const name = prompt("Oda ismi:");
        const pass = prompt("Şifre koymak ister misin? (Boş bırakabilirsin)");
        if(name) {
            set(ref(db, 'rooms/' + name), {
                videoId: "dQw4w9WgXcQ",
                time: 0,
                status: 1,
                password: pass || null,
                isPrivate: pass ? true : false
            });
            window.location.hash = name;
            location.reload();
        }
    };

    // (Geri kalan YouTube ve Senkronizasyon kodları aynı kalacak şekilde entegre edilir)
    // ... [YouTube API ve onValue(roomRef) kodların buraya gelecek] ...

</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
