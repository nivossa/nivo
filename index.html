<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nivos Pixel Wars</title>
    
    <style>
        /* SIFIRLAMA VE TEMEL AYARLAR */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { 
            width: 100vw; height: 100vh; 
            background-color: #121212; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            touch-action: none; /* Mobilde sayfayı kaydırmayı engeller */
        }

        /* --- ANA TUVAL (CANVAS) --- */
        #viewport {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 20px 20px;
            z-index: 1;
        }

        #canvas-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform-origin: center center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            background-color: #fff;
            image-rendering: pixelated; /* Piksellerin bulanıklaşmasını engeller */
        }

        /* --- ARAYÜZ (UI) ELEMANLARI --- */
        .ui-layer {
            position: absolute;
            z-index: 100;
            pointer-events: none; /* Arkadaki tuvale tıklamayı engellemesin diye */
        }

        .interactive {
            pointer-events: auto; /* Sadece butonların tıklanabilir olması için */
        }

        /* Üst Menü */
        #top-bar {
            top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .panel {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .title { color: #ff4500; font-size: 20px; font-weight: 900; font-style: italic; letter-spacing: -1px; margin-bottom: 5px; }
        .stats { font-size: 12px; color: #aaa; font-weight: 600; display: flex; gap: 15px;}
        .stats span { color: #4ade80; }

        /* Sağ Üst Bilgi */
        #info-panel { text-align: right; }
        .info-row { font-family: monospace; font-size: 16px; font-weight: bold; margin-bottom: 5px;}
        .info-label { font-size: 10px; color: #888; text-transform: uppercase; }

        /* --- RENK PALETİ (DÜZELTİLEN KISIM) --- */
        #palette-wrapper {
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        #cooldown-badge {
            background: #ff4500; color: white;
            padding: 5px 15px; border-radius: 20px;
            font-weight: bold; font-size: 14px;
            display: none; box-shadow: 0 4px 10px rgba(255,69,0,0.4);
        }

        #palette {
            background: rgba(20, 20, 20, 0.9);
            padding: 12px; border-radius: 16px;
            display: flex; flex-direction: row; gap: 8px; /* O devasa kutuyu önleyen yer */
            border: 1px solid rgba(255,255,255,0.15);
            max-width: 90vw; overflow-x: auto;
            align-items: center; height: auto;
        }
        
        #palette::-webkit-scrollbar { display: none; }

        .color-btn {
            width: 32px; height: 32px;
            border-radius: 6px; cursor: pointer;
            border: 2px solid rgba(0,0,0,0.3);
            flex-shrink: 0; /* Daralmayı engeller */
            transition: transform 0.1s;
        }

        .color-btn:hover { transform: scale(1.1); }
        .color-btn.active { border: 2px solid white; transform: scale(1.2); box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* Fare Ucu Koordinat */
        #cursor-tooltip {
            position: fixed; background: rgba(0,0,0,0.8);
            padding: 3px 6px; border-radius: 4px; font-size: 10px;
            font-family: monospace; pointer-events: none; z-index: 200; display: none;
        }

        /* Yükleme Ekranı */
        #loader {
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="color: white; font-style: italic;">NIVOS PIXEL WARS</h2>
        <p style="color: #666; font-size: 12px; margin-top: 10px;">Sunucuya bağlanıyor...</p>
    </div>

    <div id="cursor-tooltip">0,0</div>

    <div id="top-bar" class="ui-layer interactive">
        <div class="panel">
            <div class="title">NIVOS PIXEL WARS</div>
            <div class="stats">
                <div>Durum: <span id="status-text">Bağlanıyor</span></div>
            </div>
        </div>

        <div class="panel" id="info-panel">
            <div class="info-label">Koordinat</div>
            <div class="info-row" id="coord-text">0 , 0</div>
            <div class="info-label">Yakınlaştırma</div>
            <div class="info-row" id="zoom-text">100%</div>
        </div>
    </div>

    <div id="palette-wrapper" class="ui-layer interactive">
        <div id="cooldown-badge">BEKLE: 1s</div>
        <div id="palette">
            </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <canvas id="placeCanvas"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildChanged, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Ayarları
        const firebaseConfig = {
            apiKey: "AIzaSyC1qKWgOcfueYOlqbcp_kmPg63lLuqfEjk",
            authDomain: "nivos-fe8ff.firebaseapp.com",
            databaseURL: "https://nivos-fe8ff-default-rtdb.firebaseio.com",
            projectId: "nivos-fe8ff",
            storageBucket: "nivos-fe8ff.firebasestorage.app",
            messagingSenderId: "736073357906",
            appId: "1:736073357906:web:4dc3aac147971309d59d8b",
            measurementId: "G-7GQGPHVRS9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pixelsRef = ref(db, 'board_v1');

        // Ayarlar
        const CANVAS_SIZE = 1000;
        const COLORS = [
            '#FFFFFF', '#E4E4E4', '#888888', '#222222', '#FFA7D1', '#E50000', '#E59500', '#A06A42', 
            '#E5D900', '#94E044', '#02BE01', '#00D3DD', '#0083C7', '#0000EA', '#CF6EE4', '#820080',
            '#000000', '#1A1A1A', '#FF4500', '#FFD635', '#2450A4', '#FF99AA', '#6D482F'
        ];

        let state = {
            scale: 1,
            panX: 0, panY: 0,
            isDragging: false,
            lastX: 0, lastY: 0,
            selectedColor: COLORS[5], // Varsayılan Kırmızı
            onCooldown: false
        };

        // DOM Elementleri
        const canvas = document.getElementById('placeCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const wrapper = document.getElementById('canvas-wrapper');
        const viewport = document.getElementById('viewport');
        const palette = document.getElementById('palette');
        const coordText = document.getElementById('coord-text');
        const zoomText = document.getElementById('zoom-text');
        const cursorTooltip = document.getElementById('cursor-tooltip');
        const loader = document.getElementById('loader');

        // Başlatma
        function init() {
            canvas.width = CANVAS_SIZE;
            canvas.height = CANVAS_SIZE;
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            buildPalette();
            centerCanvas();
            attachEvents();
            connectFirebase();

            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1500);
        }

        // Palet Oluşturma
        function buildPalette() {
            COLORS.forEach(color => {
                const btn = document.createElement('div');
                btn.className = 'color-btn';
                btn.style.backgroundColor = color;
                if(color === state.selectedColor) btn.classList.add('active');
                
                btn.onclick = () => {
                    state.selectedColor = color;
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
                palette.appendChild(btn);
            });
        }

        // Transform İşlemleri
        function centerCanvas() {
            // Başlangıçta tuvali tam merkeze oturtur
            state.panX = -CANVAS_SIZE / 2;
            state.panY = -CANVAS_SIZE / 2;
            applyTransform();
        }

        function applyTransform() {
            wrapper.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
            zoomText.innerText = Math.round(state.scale * 100) + '%';
        }

        // Firebase Dinleyicileri
        function connectFirebase() {
            document.getElementById('status-text').innerText = "Aktif";
            document.getElementById('status-text').style.color = "#4ade80";

            onChildAdded(pixelsRef, (snap) => {
                const [x, y] = snap.key.split('_');
                drawPixel(parseInt(x), parseInt(y), snap.val().c, false);
            });

            onChildChanged(pixelsRef, (snap) => {
                const [x, y] = snap.key.split('_');
                drawPixel(parseInt(x), parseInt(y), snap.val().c, false);
            });
        }

        // Piksel Çizme ve Gönderme
        function drawPixel(x, y, color, isLocal = false) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);

            if (isLocal) {
                const key = `${x}_${y}`;
                set(ref(db, `board_v1/${key}`), { c: color, t: serverTimestamp() })
                    .then(() => startCooldown());
            }
        }

        function startCooldown() {
            state.onCooldown = true;
            const badge = document.getElementById('cooldown-badge');
            badge.style.display = 'block';
            
            setTimeout(() => {
                state.onCooldown = false;
                badge.style.display = 'none';
            }, 1000); // 1 Saniye
        }

        // Olay Dinleyicileri (Fare ve Dokunmatik)
        function attachEvents() {
            // Tekerlek ile Yakınlaştırma (Zoom)
            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomDir = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = state.scale * zoomDir;
                
                if(newScale > 0.2 && newScale < 40) {
                    state.scale = newScale;
                    applyTransform();
                }
            }, { passive: false });

            // Sürükleme Başlangıcı
            viewport.addEventListener('mousedown', (e) => {
                if(e.button === 1 || e.button === 2) { // Sağ Tık veya Orta Tık ile sürükle
                    state.isDragging = true;
                    state.lastX = e.clientX;
                    state.lastY = e.clientY;
                    viewport.style.cursor = 'grabbing';
                } else if (e.button === 0 && !state.onCooldown) { // Sol tık ile boya
                    handlePaint(e);
                }
            });

            // Fare Hareketi
            window.addEventListener('mousemove', (e) => {
                // Koordinat Hesaplama
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / (rect.width / CANVAS_SIZE));
                const y = Math.floor((e.clientY - rect.top) / (rect.height / CANVAS_SIZE));

                if(x >= 0 && x < CANVAS_SIZE && y >= 0 && y < CANVAS_SIZE) {
                    coordText.innerText = `${x} , ${y}`;
                    cursorTooltip.style.display = 'block';
                    cursorTooltip.style.left = e.clientX + 15 + 'px';
                    cursorTooltip.style.top = e.clientY + 15 + 'px';
                    cursorTooltip.innerText = `${x},${y}`;
                } else {
                    cursorTooltip.style.display = 'none';
                }

                // Sürükleme İşlemi
                if(state.isDragging) {
                    const dx = e.clientX - state.lastX;
                    const dy = e.clientY - state.lastY;
                    state.panX += dx / state.scale;
                    state.panY += dy / state.scale;
                    state.lastX = e.clientX;
                    state.lastY = e.clientY;
                    applyTransform();
                }
            });

            window.addEventListener('mouseup', () => {
                state.isDragging = false;
                viewport.style.cursor = 'crosshair';
            });

            // Sağ tık menüsünü kapat
            viewport.addEventListener('contextmenu', e => e.preventDefault());
        }

        function handlePaint(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (rect.width / CANVAS_SIZE));
            const y = Math.floor((e.clientY - rect.top) / (rect.height / CANVAS_SIZE));

            if(x >= 0 && x < CANVAS_SIZE && y >= 0 && y < CANVAS_SIZE) {
                drawPixel(x, y, state.selectedColor, true);
            }
        }

        // Başlat
        init();
    </script>
</body>
</html>
