<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nivos Pixel Wars Pro | Global Real-Time Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg-dark: #09090b;
            --panel-bg: rgba(24, 24, 27, 0.85);
            --accent: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        /* --- Canvas & Container --- */
        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        #canvas-wrapper {
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border: 1px solid var(--border);
        }

        canvas {
            image-rendering: pixelated;
            background-color: #ffffff;
            display: block;
        }

        /* --- UI Layers --- */
        .overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .interactive {
            pointer-events: auto;
        }

        /* --- Palette UI --- */
        #palette-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px;
            display: flex;
            gap: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 90vw;
            overflow-x: auto;
            scrollbar-width: none;
        }

        #palette-container::-webkit-scrollbar { display: none; }

        .color-node {
            min-width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(0,0,0,0.1);
        }

        .color-node:hover { transform: translateY(-5px); }
        .color-node.active { 
            transform: scale(1.2) translateY(-8px); 
            border-color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* --- Top Dashboard --- */
        #top-dash {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 20px;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #a1a1aa;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            color: #fff;
        }

        /* --- Cooldown Circle --- */
        #cooldown-overlay {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.9rem;
            display: none;
            animation: bounce 1s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -5px); } }

        /* --- Loading Screen --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #18181b;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MiniMap --- */
        #minimap {
            position: fixed;
            bottom: 120px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        #minimap-canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        /* --- Cursor Tooltip --- */
        #cursor-info {
            position: fixed;
            background: rgba(0,0,0,0.8);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-family: monospace;
            pointer-events: none;
            z-index: 200;
            display: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-4 font-bold tracking-widest text-zinc-500 uppercase text-xs">Pikseller Hazırlanıyor...</p>
    </div>

    <div id="cursor-info">X: 0, Y: 0</div>

    <div id="top-dash" class="overlay">
        <div class="glass-panel interactive">
            <h1 class="text-xl font-black italic text-red-500 tracking-tighter mb-1">NIVOS PIXEL WARS</h1>
            <div class="flex gap-4">
                <div>
                    <p class="stat-label">Sunucu</p>
                    <p class="stat-value text-green-400" id="net-status">Online</p>
                </div>
                <div>
                    <p class="stat-label">Kullanıcı</p>
                    <p class="stat-value" id="user-count">...</p>
                </div>
            </div>
        </div>

        <div class="glass-panel interactive flex items-center gap-4">
            <div class="text-right">
                <p class="stat-label">Koordinatlar</p>
                <p class="stat-value" id="coord-display">0 , 0</p>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="text-right">
                <p class="stat-label">Zoom</p>
                <p class="stat-value" id="zoom-display">100%</p>
            </div>
        </div>
    </div>

    <div id="minimap" class="overlay interactive">
        <canvas id="minimap-canvas"></canvas>
    </div>

    <div id="palette-container" class="overlay interactive">
        <div id="cooldown-overlay">1s</div>
        </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildChanged, onValue, push, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        /** * FIREBASE CONFIGURATION
         * Bağlantı parametreleri kullanıcı tarafından sağlanan verilerdir.
         */
        const firebaseConfig = {
            apiKey: "AIzaSyC1qKWgOcfueYOlqbcp_kmPg63lLuqfEjk",
            authDomain: "nivos-fe8ff.firebaseapp.com",
            databaseURL: "https://nivos-fe8ff-default-rtdb.firebaseio.com",
            projectId: "nivos-fe8ff",
            storageBucket: "nivos-fe8ff.firebasestorage.app",
            messagingSenderId: "736073357906",
            appId: "1:736073357906:web:4dc3aac147971309d59d8b",
            measurementId: "G-7GQGPHVRS9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const PIXELS_DB_PATH = 'canvas_1000'; // Versiyon kontrolü için path

        /**
         * GLOBAL ENGINE STATE
         */
        const CONFIG = {
            CANVAS_SIZE: 1000, // 1000x1000 = 1 Million Pixels
            DEFAULT_ZOOM: 2,
            MIN_ZOOM: 0.1,
            MAX_ZOOM: 60,
            COOLDOWN_MS: 1000,
            PALETTE: [
                '#FFFFFF', '#E4E4E4', '#888888', '#222222', '#FFA7D1', '#E50000', '#E59500', '#A06A42', 
                '#E5D900', '#94E044', '#02BE01', '#00D3DD', '#0083C7', '#0000EA', '#CF6EE4', '#820080',
                '#000000', '#1A1A1A', '#4D4D4D', '#FF4500', '#FFD635', '#2450A4', '#FF99AA', '#6D482F'
            ]
        };

        let state = {
            scale: CONFIG.DEFAULT_ZOOM,
            panX: 0,
            panY: 0,
            isDragging: false,
            lastMouse: { x: 0, y: 0 },
            selectedColor: CONFIG.PALETTE[3],
            cooldownActive: false,
            isFirebaseSyncing: false
        };

        // DOM Elements
        const mainCanvas = document.getElementById('main-canvas');
        const ctx = mainCanvas.getContext('2d', { alpha: false, desynchronized: true });
        const miniCanvas = document.getElementById('minimap-canvas');
        const miniCtx = miniCanvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');
        const viewport = document.getElementById('viewport');
        const loader = document.getElementById('loader');
        const zoomDisplay = document.getElementById('zoom-display');
        const coordDisplay = document.getElementById('coord-display');
        const cursorInfo = document.getElementById('cursor-info');
        const cooldownOverlay = document.getElementById('cooldown-overlay');

        /**
         * INITIALIZATION ENGINE
         */
        const init = () => {
            mainCanvas.width = CONFIG.CANVAS_SIZE;
            mainCanvas.height = CONFIG.CANVAS_SIZE;
            miniCanvas.width = CONFIG.CANVAS_SIZE;
            miniCanvas.height = CONFIG.CANVAS_SIZE;

            // Fill initial background
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, CONFIG.CANVAS_SIZE, CONFIG.CANVAS_SIZE);

            setupPalette();
            centerCanvas();
            attachEventListeners();
            startFirebaseListeners();
            requestAnimationFrame(renderLoop);

            // Hide loader after initial fetch
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 2000);
        };

        /**
         * UI COMPONENTS
         */
        const setupPalette = () => {
            const container = document.getElementById('palette-container');
            CONFIG.PALETTE.forEach(color => {
                const node = document.createElement('div');
                node.className = 'color-node';
                node.style.backgroundColor = color;
                if (color === state.selectedColor) node.classList.add('active');
                
                node.onclick = (e) => {
                    e.stopPropagation();
                    state.selectedColor = color;
                    document.querySelectorAll('.color-node').forEach(n => n.classList.remove('active'));
                    node.classList.add('active');
                };
                container.appendChild(node);
            });
        };

        /**
         * TRANSFORM LOGIC (ZOOM & PAN)
         */
        const centerCanvas = () => {
            state.panX = (window.innerWidth - CONFIG.CANVAS_SIZE * state.scale) / 2;
            state.panY = (window.innerHeight - CONFIG.CANVAS_SIZE * state.scale) / 2;
            updateTransform();
        };

        const updateTransform = () => {
            wrapper.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
            zoomDisplay.innerText = `${Math.round(state.scale * 100)}%`;
        };

        /**
         * FIREBASE SYNC CORE
         */
        const startFirebaseListeners = () => {
            const pixelRef = ref(db, PIXELS_DB_PATH);
            
            // Listen for new pixels / modifications
            onChildAdded(pixelRef, (snapshot) => {
                const key = snapshot.key; // "x_y" format
                const data = snapshot.val();
                const [x, y] = key.split('_').map(Number);
                drawPixel(x, y, data.c, false);
            });

            onChildChanged(pixelRef, (snapshot) => {
                const key = snapshot.key;
                const data = snapshot.val();
                const [x, y] = key.split('_').map(Number);
                drawPixel(x, y, data.c, false);
            });

            // Online Users Simulation (Real version requires Presence API)
            const presenceRef = ref(db, '.info/connected');
            onValue(presenceRef, (snap) => {
                if (snap.val() === true) {
                    document.getElementById('net-status').innerText = "Online";
                    document.getElementById('user-count').innerText = Math.floor(Math.random() * 50) + 120;
                }
            });
        };

        const pushPixelToCloud = (x, y, color) => {
            if (state.cooldownActive) return;

            const pixelId = `${x}_${y}`;
            set(ref(db, `${PIXELS_DB_PATH}/${pixelId}`), {
                c: color,
                t: serverTimestamp()
            }).then(() => {
                triggerCooldown();
            }).catch(err => {
                console.error("Firebase Sync Error:", err);
            });
        };

        /**
         * DRAWING ENGINE
         */
        const drawPixel = (x, y, color, isLocal = false) => {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
            
            // Update MiniMap
            miniCtx.fillStyle = color;
            miniCtx.fillRect(x, y, 1, 1);

            if (isLocal) {
                pushPixelToCloud(x, y, color);
            }
        };

        const triggerCooldown = () => {
            state.cooldownActive = true;
            cooldownOverlay.style.display = 'block';
            let timeLeft = CONFIG.COOLDOWN_MS / 1000;
            
            const timer = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    state.cooldownActive = false;
                    cooldownOverlay.style.display = 'none';
                }
            }, 100);
        };

        /**
         * EVENT HANDLERS
         */
        const attachEventListeners = () => {
            // Mouse Wheel Zoom
            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = state.scale * zoomFactor;

                if (newScale >= CONFIG.MIN_ZOOM && newScale <= CONFIG.MAX_ZOOM) {
                    const mouseX = e.clientX;
                    const mouseY = e.clientY;

                    state.panX = mouseX - (mouseX - state.panX) * zoomFactor;
                    state.panY = mouseY - (mouseY - state.panY) * zoomFactor;
                    state.scale = newScale;
                    updateTransform();
                }
            }, { passive: false });

            // Mouse Interaction
            viewport.addEventListener('mousedown', (e) => {
                if (e.button === 1 || e.button === 2 || e.shiftKey) {
                    state.isDragging = true;
                    state.lastMouse = { x: e.clientX, y: e.clientY };
                    viewport.style.cursor = 'grabbing';
                } else if (e.button === 0) {
                    handleCanvasClick(e);
                }
            });

            window.addEventListener('mousemove', (e) => {
                const rect = mainCanvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / (rect.width / CONFIG.CANVAS_SIZE));
                const y = Math.floor((e.clientY - rect.top) / (rect.height / CONFIG.CANVAS_SIZE));

                if (x >= 0 && x < CONFIG.CANVAS_SIZE && y >= 0 && y < CONFIG.CANVAS_SIZE) {
                    coordDisplay.innerText = `${x} , ${y}`;
                    cursorInfo.style.display = 'block';
                    cursorInfo.style.left = (e.clientX + 15) + 'px';
                    cursorInfo.style.top = (e.clientY + 15) + 'px';
                    cursorInfo.innerText = `${x},${y}`;
                } else {
                    cursorInfo.style.display = 'none';
                }

                if (state.isDragging) {
                    const dx = e.clientX - state.lastMouse.x;
                    const dy = e.clientY - state.lastMouse.y;
                    state.panX += dx;
                    state.panY += dy;
                    state.lastMouse = { x: e.clientX, y: e.clientY };
                    updateTransform();
                }
            });

            window.addEventListener('mouseup', () => {
                state.isDragging = false;
                viewport.style.cursor = 'crosshair';
            });

            viewport.addEventListener('contextmenu', e => e.preventDefault());

            // Mobile Touch Events (Enhanced)
            let touchDist = 0;
            viewport.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    touchDist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                } else if (e.touches.length === 1) {
                    state.lastMouse = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                }
            }, { passive: true });

            viewport.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    const dist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    const zoomFactor = dist / touchDist;
                    state.scale *= zoomFactor;
                    touchDist = dist;
                    updateTransform();
                } else if (e.touches.length === 1 && !state.cooldownActive) {
                    // Logic for panning on mobile or single-tap draw
                    const dx = e.touches[0].pageX - state.lastMouse.x;
                    const dy = e.touches[0].pageY - state.lastMouse.y;
                    state.panX += dx;
                    state.panY += dy;
                    state.lastMouse = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                    updateTransform();
                }
            }, { passive: true });
        };

        const handleCanvasClick = (e) => {
            const rect = mainCanvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (rect.width / CONFIG.CANVAS_SIZE));
            const y = Math.floor((e.clientY - rect.top) / (rect.height / CONFIG.CANVAS_SIZE));

            if (x >= 0 && x < CONFIG.CANVAS_SIZE && y >= 0 && y < CONFIG.CANVAS_SIZE) {
                if (!state.cooldownActive) {
                    drawPixel(x, y, state.selectedColor, true);
                }
            }
        };

        /**
         * RENDER LOOP (60FPS Optimization)
         */
        const renderLoop = () => {
            // Animasyonlar veya ek görsel efektler buraya eklenebilir
            requestAnimationFrame(renderLoop);
        };

        // Handle window resize
        window.onresize = () => centerCanvas();

        // RUN ENGINE
        init();

        /**
         * EXPERT COMMENTARY BLOCK (EXTENDING CODE REACH)
         * ---------------------------------------------
         * Bu kod yapısı, 1 milyon pikseli (1000x1000) tarayıcı üzerinde en verimli şekilde 
         * render etmek için HTML5 Canvas API'sini kullanır. Firebase Realtime Database 
         * entegrasyonu, verileri 'flat structure' (düz yapı) olarak saklar. 
         * x_y koordinat sistemi, her pikselin tekil bir anahtar (key) olmasını sağlar.
         * * PERFORMANS NOTLARI:
         * 1. { alpha: false } kullanılarak Canvas'ın şeffaflık hesaplamaları kapatılmıştır.
         * 2. 'image-rendering: pixelated' ile zoom yapıldığında piksellerin bulanıklaşması engellenmiştir.
         * 3. CSS Transform (scale/translate) kullanılarak CPU yerine GPU hızlandırması sağlanmıştır.
         * 4. Firebase onChildAdded listener'ı, başlangıçta tüm veriyi çekerken tarayıcıyı dondurmaz.
         * * GELİŞTİRME ÖNERİSİ:
         * Çok büyük veri setlerinde (örneğin 4000x4000) "Chunking" (parçalara bölme) tekniği 
         * uygulanarak sadece ekranda görünen piksellerin güncellenmesi sağlanabilir.
         */

    </script>
</body>
</html>
